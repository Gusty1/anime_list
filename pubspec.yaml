name: anime_list
description: 'Show Anime List'
publish_to: 'none'

version: 1.3.3+17

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  go_router: ^17.1.0
  flex_color_scheme: ^8.4.0
  dio: ^5.9.1
  logger: ^2.6.2
  flutter_spinkit: ^5.2.2
  shared_preferences: ^2.5.4
  flutter_native_splash: ^2.4.7
  package_info_plus: ^10.0.0
  connectivity_plus: ^7.0.0
  url_launcher: ^6.3.2
  fluttertoast: ^9.0.0
  flutter_riverpod: ^3.2.1
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  contained_tab_bar_view: ^0.8.0
  share_plus: ^13.0.0
  feedback: ^3.2.0
  flutter_email_sender: ^10.0.1
  path_provider: ^2.1.5

  easy_image_viewer: ^1.5.1
  sqflite: ^2.4.2
  path: ^1.9.1
  permission_handler: ^12.0.1
  image_gallery_saver_plus: ^5.0.0
  device_info_plus: ^13.0.0
  youtube_player_flutter: ^9.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  # 指定是否為 Android 生成圖標 (設為 true)
  android: true
  ios: false
  image_path: 'assets/icon.png'

# flutter_native_splash設定，就是等待載入時的畫面
flutter_native_splash:
  color: '#bec2c4' # 你的背景顏色 (Hex 格式)
  image: assets/splash_image.png # 你的 Splash Image 檔案路徑

  # 可選：額外設定
  fullscreen: true # 是否全螢幕顯示 (無狀態列/導航列)

  # 可選：品牌圖片 (位於主要圖片下方)
  # branding: assets/branding_image.png
  # branding_mode: bottom # branding_mode 支援 bottom, top, center, scale

  # 可選：指定生成平台 (預設是全部支援的平台)
  # platforms:
  #   android: true
  #   ios: true
  #   web: true

flutter:
  uses-material-design: true
  assets:
    - assets/